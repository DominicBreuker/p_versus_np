name: Lean4 Proof Check

on:
  workflow_dispatch:

jobs:
  check_lean:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Lean toolchain, cache, and build artifacts
        uses: leanprover/lean-action@v1.5.0
        with:
          build: true
          test: false
          lint: false

      - name: Check proof files
        run: |
          set -euo pipefail
          mapfile -d '' proofs < <(find proofs -mindepth 3 -maxdepth 3 -name 'Proof.lean' -print0 | sort -z)
          if [ "${#proofs[@]}" -eq 0 ]; then
            echo "No proof files found."
            exit 0
          fi
          for f in "${proofs[@]}"; do
            echo "Checking executable Lean file: $f"
            lake env lean "$f"
          done

name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .mcp.json
      - AGENTS.md
      - lake-manifest.json
      - lean-toolchain
      - lakefile.lean
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .mcp.json
      - AGENTS.md
      - lake-manifest.json
      - lean-toolchain
      - lakefile.lean

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Set up Lean toolchain, cache, and build artifacts
        uses: leanprover/lean-action@v1.5.0
        with:
          build: true
          test: false
          lint: false

      - name: Prime Lean MCP server
        run: |
          uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Verify preinstalled tools
        run: |
          python --version
          lean --version
          lake --version
          rg --version
          test -f lake-manifest.json
          uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

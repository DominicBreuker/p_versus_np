name: Researcher

on:
  workflow_dispatch:

jobs:
  run_researcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Mistral Vibe
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user "mistral-vibe==2.8.1"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set up Lean toolchain
        run: elan toolchain install "$(cat lean-toolchain)"

      - name: Download Mathlib build cache
        run: lake exe cache get || true

      - name: Run Researcher Agent
        id: researcher
        env:
          MISTRAL_VIBE_KEY: ${{ secrets.MISTRAL_VIBE_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
        run: python .github/scripts/researcher.py

      - name: Clean up trailing whitespace
        run: |
          find candidates -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} \;
          find candidates -name "*.lean" -exec sed -i 's/[[:space:]]*$//' {} \;
          sed -i 's/[[:space:]]*$//' lib/utils.lean

      - name: Validate Lean project
        run: |
          lake build
          FAILED=0
          while IFS= read -r -d '' f; do
            echo "Checking: $f"
            if ! lean "$f" 2>&1; then
              echo "::error file=$f::Lean4 check failed"
              FAILED=1
            fi
          done < <(find candidates -name "*.lean" -print0)
          exit $FAILED

      - name: Commit and push changes
        run: |
          git config --global user.name "Researcher"
          git config --global user.email "researcher@p-vs-np.github"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Researcher update: work on ${{ steps.researcher.outputs.idea_name || 'idea' }}"
          git push

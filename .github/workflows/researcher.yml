name: Researcher

on:
  workflow_dispatch:

jobs:
  run_researcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run researcher unit tests
        run: python -m unittest discover -s tests -v

      - name: Install mock Mistral Vibe CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -sf "$GITHUB_WORKSPACE/.github/scripts/mock_vibe.py" "$HOME/.local/bin/vibe"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up Lean toolchain, cache, and build artifacts
        uses: leanprover/lean-action@v1.5.0
        with:
          build: true
          test: false
          lint: false

      - name: Prime Lean MCP server
        run: uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Configure Mistral Vibe MCP servers
        run: |
          mkdir -p "$HOME/.vibe"
          cat > "$HOME/.vibe/config.toml" <<'EOF'
          [[mcp_servers]]
          name = "lean-lsp"
          transport = "stdio"
          command = "uvx"
          args = ["--from", "lean-lsp-mcp==0.26.1", "lean-lsp-mcp"]
          tool_timeout_sec = 600

          [mcp_servers.env]
          LEAN_REPL = "true"
          EOF

      - name: Verify researcher tools
        run: |
          python --version
          vibe --version
          lean --version
          lake --version
          rg --version
          test -f lake-manifest.json
          uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Run Researcher Agent
        id: researcher
        env:
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
          MISTRAL_VIBE_BIN: ${{ github.workspace }}/.github/scripts/mock_vibe.py
        run: python .github/scripts/researcher.py

      - name: Clean up trailing whitespace
        run: |
          find candidates -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} \;
          find candidates -name "*.lean" -exec sed -i 's/[[:space:]]*$//' {} \;
          find lib -name "*.lean" -exec sed -i 's/[[:space:]]*$//' {} \;

      - name: Validate Lean project
        run: |
          set -euo pipefail
          lake build
          mapfile -d '' proofs < <(find candidates -name "*.lean" -print0 | sort -z)
          for f in "${proofs[@]}"; do
            echo "Checking executable Lean file: $f"
            lake env lean "$f"
          done

      - name: Commit and push changes
        run: |
          git config --global user.name "Researcher"
          git config --global user.email "researcher@p-vs-np.github"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Researcher update: work on ${{ steps.researcher.outputs.idea_name || 'idea' }}"
          git push

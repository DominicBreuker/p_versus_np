name: Researcher

on:
  workflow_dispatch:

jobs:
  run_researcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Install Mistral Vibe
        run: |
          python -m pip install --user "mistral-vibe==2.8.1"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up Lean toolchain, cache, and build artifacts
        uses: leanprover/lean-action@v1.5.0
        with:
          build: true
          test: false
          lint: false

      - name: Prime Lean MCP server
        run: uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Configure Mistral Vibe MCP servers
        run: |
          mkdir -p "$HOME/.vibe"
          cat > "$HOME/.vibe/config.toml" <<'EOF'
          [[mcp_servers]]
          name = "lean-lsp"
          transport = "stdio"
          command = "uvx"
          args = ["--from", "lean-lsp-mcp==0.26.1", "lean-lsp-mcp"]
          tool_timeout_sec = 600

          [mcp_servers.env]
          LEAN_REPL = "true"
          EOF

      - name: Verify researcher tools
        run: |
          vibe --version
          lean --version
          lake --version
          rg --version
          uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Run Researcher Agent
        id: researcher
        env:
          MISTRAL_VIBE_KEY: ${{ secrets.MISTRAL_VIBE_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
        run: python .github/scripts/researcher.py

      - name: Clean up trailing whitespace
        run: |
          find candidates -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} \;
          find candidates -name "*.lean" -exec sed -i 's/[[:space:]]*$//' {} \;
          sed -i 's/[[:space:]]*$//' lib/utils.lean

      - name: Validate Lean project
        run: |
          lake build
          FAILED=0
          while IFS= read -r -d '' f; do
            echo "Checking: $f"
            if ! lean "$f" 2>&1; then
              echo "::error file=$f::Lean4 check failed"
              FAILED=1
            fi
          done < <(find candidates -name "*.lean" -print0)
          exit $FAILED

      - name: Commit and push changes
        run: |
          git config --global user.name "Researcher"
          git config --global user.email "researcher@p-vs-np.github"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Researcher update: work on ${{ steps.researcher.outputs.idea_name || 'idea' }}"
          git push

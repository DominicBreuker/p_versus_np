name: Researcher

on:
  workflow_dispatch:

jobs:
  run_researcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run researcher unit tests
        run: python -m unittest discover -s tests -v

      - name: Configure Vibe home
        run: |
          echo "VIBE_HOME=$RUNNER_TEMP/vibe-home" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/vibe-home"

      - name: Require Mistral API key
        env:
          MISTRAL_VIBE_KEY: ${{ secrets.MISTRAL_VIBE_KEY }}
        run: |
          test -n "$MISTRAL_VIBE_KEY"

      - name: Install real Mistral Vibe CLI
        run: |
          # CI must use the real `vibe` CLI. The repository mock is only for
          # researcher.py development/tests where no live API key should be used.
          uv tool install --force --python 3.12 "mistral-vibe==2.8.1"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate explicit Vibe session ID
        id: vibe_session
        run: |
          SESSION_ID="$(python - <<'PY'
          import uuid
          print(uuid.uuid4())
          PY
          )"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "MISTRAL_VIBE_SESSION_ID=$SESSION_ID" >> "$GITHUB_ENV"
          echo "Using explicit Vibe session ID: $SESSION_ID"

      - name: Set up Lean toolchain, cache, and build artifacts
        uses: leanprover/lean-action@v1.5.0
        with:
          build: true
          test: false
          lint: false

      - name: Prime Lean MCP server
        run: uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Configure Mistral Vibe MCP servers
        run: |
          mkdir -p "$VIBE_HOME"
          cat > "$VIBE_HOME/config.toml" <<'EOF'
          # Programmatic `vibe --prompt` only defaults to auto-approve when the
          # default agent is used, so force non-interactive approvals here.
          auto_approve = true
          # The builtin Lean agent is opt-in upstream and must be installed explicitly.
          installed_agents = ["lean"]

          [[mcp_servers]]
          name = "lean-lsp"
          transport = "stdio"
          command = "uvx"
          args = ["--from", "lean-lsp-mcp==0.26.1", "lean-lsp-mcp"]
          tool_timeout_sec = 600

          [mcp_servers.env]
          LEAN_REPL = "true"
          EOF

      - name: Verify researcher tools
        run: |
          python --version
          vibe --version
          lean --version
          lake --version
          rg --version
          test -f lake-manifest.json
          uvx --from "lean-lsp-mcp==0.26.1" lean-lsp-mcp --help >/dev/null

      - name: Run Lean Researcher Agent
        id: researcher-lean
        env:
          MISTRAL_VIBE_KEY: ${{ secrets.MISTRAL_LABS_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
          MISTRAL_AGENT: "lean"
        run: python .github/scripts/researcher.py

      - name: Commit and push lean changes
        if: always()
        run: |
          git config --global user.name "Lean-Researcher"
          git config --global user.email "lean-researcher@p-vs-np.github"
          git add .
          if ! git diff --quiet || ! git diff --staged --quiet; then
            if [ "${{ steps.researcher-lean.outputs.run_outcome }}" = "success" ]; then
              git commit -m "Lean Researcher update: work on ${{ steps.researcher-lean.outputs.target_label || 'proof target' }}"
            else
              git commit -m "Lean Researcher update (interrupted): work on ${{ steps.researcher-lean.outputs.target_label || 'proof target' }}"
            fi
            git push
          fi

      - name: Run Devstral Researcher Agent
        id: researcher-devstral
        env:
          MISTRAL_VIBE_KEY: ${{ secrets.MISTRAL_VIBE_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
          MISTRAL_AGENT: "auto-approve"
        run: python .github/scripts/researcher.py

      - name: Clean up trailing whitespace
        if: always()
        run: |
          find proofs -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} \;
          find proofs -name "*.lean" -exec sed -i 's/[[:space:]]*$//' {} \;
          find lib -name "*.lean" -exec sed -i 's/[[:space:]]*$//' {} \;

      - name: Validate Lean project
        if: always()
        id: validate
        continue-on-error: true
        run: |
          set -euo pipefail
          lake build
          mapfile -d '' proof_files < <(find proofs -name "*.lean" -print0 | sort -z)
          for f in "${proof_files[@]}"; do
            echo "Checking executable Lean file: $f"
            lake env lean "$f"
          done

      - name: Commit and push devstral changes
        if: always()
        run: |
          git config --global user.name "Devstral Researcher"
          git config --global user.email "devstral-researcher@p-vs-np.github"
          git add .
          if ! git diff --quiet || ! git diff --staged --quiet; then
            if [ "${{ steps.researcher-devstral.outputs.run_outcome }}" = "success" ]; then
              git commit -m "Devstral Researcher update: work on ${{ steps.researcher-devstral.outputs.target_label || 'proof target' }}"
            else
              git commit -m "Devstral Researcher update (interrupted): work on ${{ steps.researcher-devstral.outputs.target_label || 'proof target' }}"
            fi
            git push
          fi

      - name: Fail workflow if researcher or validation failed
        if: always()
        run: |
          if [ "${{ steps.researcher-lean.outcome }}" != "success" ]; then
            echo "Lean researcher step failed."
            exit 1
          fi
          if [ "${{ steps.researcher-devstral.outcome }}" != "success" ]; then
            echo "Devstral researcher step failed."
            exit 1
          fi
          if [ "${{ steps.validate.outcome }}" != "success" ]; then
            echo "Lean validation failed."
            exit 1
          fi
